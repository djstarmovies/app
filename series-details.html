<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dj Star Movies - Series Details</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{

    background:#080808;
    color:#fff;
    font-family:'Poppins',sans-serif;
    padding-bottom:40px;

}

/* Hero Banner */

.hero{

    position:relative;

    width:100%;

    height:280px;

    overflow:hidden;

    background:#111;

}

.hero img{

    width:100%;

    height:100%;

    object-fit:cover;

}

.hero::after{

    content:"";

    position:absolute;

    left:0;
    right:0;
    bottom:0;
    top:0;

    background:
    linear-gradient(to top,#080808 0%,rgba(8,8,8,.15) 55%,rgba(8,8,8,.35) 100%);

}

/* Floating Buttons */

.top-buttons{

    position:absolute;

    top:18px;

    left:18px;

    right:18px;

    display:flex;

    justify-content:space-between;

    z-index:10;

}

.circle-btn{

    width:46px;

    height:46px;

    border-radius:50%;

    border:none;

    background:rgba(0,0,0,.55);

    backdrop-filter:blur(12px);

    color:#fff;

    font-size:18px;

    cursor:pointer;

    transition:.25s;

}

.circle-btn:hover{

    transform:scale(1.08);

    background:#e50914;

}

/* Details */

.details{

    margin-top:-55px;

    position:relative;

    z-index:5;

    padding:20px;

}

.title{

    font-size:30px;

    font-weight:700;

    margin-bottom:12px;

}

.meta{

    display:flex;

    flex-wrap:wrap;

    gap:10px;

    color:#b5b5b5;

    font-size:14px;

    margin-bottom:18px;

}

.meta span{

    background:#171717;

    padding:6px 12px;

    border-radius:30px;

}

.synopsis{

    color:#d4d4d4;

    line-height:1.8;

    margin-bottom:24px;

    font-size:15px;

}

/* Action Buttons */

.actions{

    display:grid;

    grid-template-columns:repeat(3,1fr);

    gap:12px;

    margin-bottom:28px;

}

.action-btn{

    border:none;

    border-radius:16px;

    padding:15px;

    cursor:pointer;

    color:#fff;

    font-weight:600;

    font-size:15px;

    transition:.25s;

}

.play-btn{

    background:#e50914;

}

.favorite-btn{

    background:#222;

}

.share-btn{

    background:#1f2937;

}

.action-btn:hover{

    transform:translateY(-3px);

}

/* Section */

.section{

    padding:0 20px;

    margin-top:10px;

}

.section-title{

    font-size:20px;

    font-weight:700;

    margin-bottom:18px;

}

/* Episodes */

.episodes{

    display:flex;

    flex-direction:column;

    gap:12px;

}

.episode{

    display:flex;

    align-items:center;

    justify-content:space-between;

    background:#151515;

    border-radius:16px;

    padding:16px;

    cursor:pointer;

    transition:.25s;

    border:1px solid rgba(255,255,255,.05);

}

.episode:hover{

    background:#1d1d1d;

    transform:translateX(4px);

}

.ep-left{

    display:flex;

    gap:14px;

    align-items:center;

}

.ep-icon{

    width:48px;

    height:48px;

    border-radius:12px;

    background:#e50914;

    display:flex;

    justify-content:center;

    align-items:center;

    font-size:18px;

}

.ep-title{

    font-weight:600;

}

.ep-meta{

    color:#999;

    font-size:13px;

    margin-top:4px;

}

/* Similar Series */

.similar{

    display:grid;

    grid-template-columns:repeat(auto-fill,minmax(140px,1fr));

    gap:14px;

}

.similar-card{

    background:#151515;

    border-radius:16px;

    overflow:hidden;

    cursor:pointer;

    transition:.25s;

}

.similar-card:hover{

    transform:translateY(-5px);

}

.similar-card img{

    width:100%;

    aspect-ratio:2/3;

    object-fit:cover;

}

.similar-info{

    padding:10px;

}

.similar-title{

    font-size:14px;

    font-weight:600;

    color:#fff;

}

/* Toast */

.toast{

    position:fixed;

    left:50%;

    bottom:30px;

    transform:translateX(-50%) translateY(100px);

    background:#181818;

    color:#fff;

    padding:14px 20px;

    border-radius:14px;

    border:1px solid rgba(255,255,255,.08);

    transition:.35s;

    opacity:0;

    z-index:9999;

}

.toast.show{

    opacity:1;

    transform:translateX(-50%) translateY(0);

}

/* Loading */

.loading{

    text-align:center;

    padding:80px 20px;

    color:#999;

}

@media(max-width:768px){

.hero{

    height:220px;

}

.title{

    font-size:24px;

}

.actions{

    grid-template-columns:1fr;

}

.similar{

    grid-template-columns:repeat(2,1fr);

}

}

</style>
</head>

<body>

<div class="hero">

    <img id="heroImage" src="" alt="Series Banner">

    <div class="top-buttons">

        <button class="circle-btn" onclick="history.back()">
            <i class="fas fa-arrow-left"></i>
        </button>

        <button class="circle-btn" id="favoriteBtn">
            <i class="far fa-heart"></i>
        </button>

    </div>

</div>

<div class="details">

    <h1 class="title" id="title">
        Loading...
    </h1>

    <div class="meta">

        <span id="rating">⭐ --</span>

        <span id="genre">Genre</span>

        <span id="year">Year</span>

        <span id="country">Country</span>

    </div>

    <p class="synopsis" id="synopsis">
        Loading series information...
    </p>

    <div class="actions">

        <button class="action-btn play-btn" id="playBtn">
            <i class="fas fa-play"></i>
            Play
        </button>

        <button class="action-btn favorite-btn" id="myListBtn">
            <i class="fas fa-heart"></i>
            My List
        </button>

        <button class="action-btn share-btn" id="shareBtn">
            <i class="fas fa-share-alt"></i>
            Share
        </button>

    </div>

</div>

<section class="section">

    <h2 class="section-title">
        Episodes
    </h2>

    <div class="episodes" id="episodesList">

        <div class="loading">
            Loading episodes...
        </div>

    </div>

</section>

<section class="section" style="margin-top:40px;">

    <h2 class="section-title">
        More Like This
    </h2>

    <div class="similar" id="similarSeries">

        <div class="loading">
            Loading recommendations...
        </div>
    </div>

</section>

<div class="toast" id="toast"></div>

<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

// ==========================
// SUPABASE
// ==========================

const supabase = createClient(

"https://rjjsdqikvtzhnpmdouir.supabase.co",

"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJqanNkcWlrdnR6aG5wbWRvdWlyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI5NzAxMDAsImV4cCI6MjA5ODU0NjEwMH0.sbeeCa8LVYGzPzT5mm06eZeQfjrRdFgbsUjqoR2K7tk"

);

// ==========================
// VARIABLES
// ==========================

const params = new URLSearchParams(location.search);

const seriesId = params.get("id");

let currentSeries = null;

// Replace later with authenticated user id
const USER_ID = "demo-user";

// ==========================
// TOAST
// ==========================

function showToast(message){

    const toast = document.getElementById("toast");

    toast.textContent = message;

    toast.classList.add("show");

    setTimeout(()=>{

        toast.classList.remove("show");

    },2500);

}

// ==========================
// LOAD SERIES
// ==========================

async function loadSeries(){

    const { data, error } = await supabase

    .from("series")

    .select("*")

    .eq("id",seriesId)

    .single();

    if(error || !data){

        document.body.innerHTML = `
        <div style="
        padding:80px 20px;
        text-align:center;
        color:#999;">
        <h2>Series not found</h2>
        </div>
        `;

        return;

    }

    currentSeries = data;

    // Increase view count

    await supabase

    .from("series")

    .update({

        views:(data.views || 0)+1

    })

    .eq("id",seriesId);

    // Populate page

    document.getElementById("heroImage").src =
    data.horizontal_poster || data.poster || "";

    document.getElementById("title").textContent =
    data.title;

    document.getElementById("genre").textContent =
    data.genre || "Unknown";

    document.getElementById("year").textContent =
    data.year || "-";

    document.getElementById("country").textContent =
    data.country || "-";

    document.getElementById("rating").textContent =
    "⭐ " + (data.rating || "N/A");

    document.getElementById("synopsis").textContent =
    data.synopsis || "No synopsis available.";

    loadEpisodes();

    loadSimilar();

}

// ==========================
// LOAD EPISODES
// ==========================

async function loadEpisodes(){

    const box = document.getElementById("episodesList");

    box.innerHTML = "";

    const { data, error } = await supabase

    .from("episodes")

    .select("*")

    .eq("series_id",seriesId)

    .order("episode_number",{ascending:true});

    if(error || !data || data.length===0){

        box.innerHTML = `
        <div class="loading">
        No episodes available.
        </div>
        `;

        return;

    }

    data.forEach(ep=>{

        const card = document.createElement("div");

        card.className = "episode";

        card.innerHTML = `

        <div class="ep-left">

            <div class="ep-icon">

                <i class="fas fa-play"></i>

            </div>

            <div>

                <div class="ep-title">

                    Episode ${ep.episode_number}

                </div>

                <div class="ep-meta">

                    ${ep.title || ""}

                </div>

            </div>

        </div>

        <i class="fas fa-chevron-right"></i>

        `;

        card.onclick = ()=>{

            location.href =
            "episode-player.html?id="+ep.id;

        };

        box.appendChild(card);

    });

}
// ==========================
// LOAD SIMILAR SERIES
// ==========================

async function loadSimilar(){

    const box = document.getElementById("similarSeries");

    box.innerHTML = "";

    const { data, error } = await supabase

    .from("series")

    .select("*")

    .eq("genre", currentSeries.genre)

    .neq("id", seriesId)

    .limit(8);

    if(error || !data || data.length === 0){

        box.innerHTML = `
        <div class="loading">
            No similar series found.
        </div>
        `;

        return;

    }

    data.forEach(item=>{

        const card = document.createElement("div");

        card.className = "similar-card";

        card.innerHTML = `
            <img src="${item.poster || ''}" alt="${item.title}">
            <div class="similar-info">
                <div class="similar-title">
                    ${item.title}
                </div>
            </div>
        `;

        card.onclick = ()=>{

            location.href =
            "series-details.html?id=" + item.id;

        };

        box.appendChild(card);

    });

}


// ==========================
// PLAY FIRST EPISODE
// ==========================

document.getElementById("playBtn").onclick = async ()=>{

    const { data } = await supabase

    .from("episodes")

    .select("*")

    .eq("series_id",seriesId)

    .order("episode_number",{ascending:true})

    .limit(1);

    if(data && data.length){

        location.href =
        "episode-player.html?id=" + data[0].id;

    }else{

        showToast("No episodes available.");

    }

};


// ==========================
// FAVORITES
// ==========================

document.getElementById("favoriteBtn").onclick = toggleFavorite;

document.getElementById("myListBtn").onclick = toggleFavorite;

async function toggleFavorite(){

    const { data } = await supabase

    .from("favorites")

    .select("*")

    .eq("user_id",USER_ID)

    .eq("series_id",seriesId);

    if(data && data.length){

        await supabase

        .from("favorites")

        .delete()

        .eq("user_id",USER_ID)

        .eq("series_id",seriesId);

        document.querySelector("#favoriteBtn i").className =
        "far fa-heart";

        showToast("Removed from My List");

    }else{

        await supabase

        .from("favorites")

        .insert({

            user_id:USER_ID,

            series_id:seriesId

        });

        document.querySelector("#favoriteBtn i").className =
        "fas fa-heart";

        showToast("Added to My List");

    }

}


// ==========================
// SHARE
// ==========================

document.getElementById("shareBtn").onclick = ()=>{

    const text = `🎬 ${currentSeries.title}

${currentSeries.synopsis || ""}

Watch now on Dj Star Movies

${location.href}`;

    if(navigator.share){

        navigator.share({

            title:currentSeries.title,

            text:text,

            url:location.href

        });

    }else{

        navigator.clipboard.writeText(location.href);

        showToast("Link copied to clipboard");

    }

};


// ==========================
// PAGE START
// ==========================

loadSeries();

</script>

</body>

</html>
