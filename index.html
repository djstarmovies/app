<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dj Star Movies</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
  body {
    background: black;
    overflow: hidden;
  }

  /* Splash screen */
  .splash {
    position: fixed;
    inset: 0;
    background: black;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    z-index: 9999;
  }

  .logo {
    font-size: 42px;
    font-weight: bold;
    color: #e50914;
    letter-spacing: 2px;
    animation: zoom 1.5s ease-in-out infinite alternate;
  }

  @keyframes zoom {
    from { transform: scale(1); opacity: 0.6; }
    to { transform: scale(1.2); opacity: 1; }
  }

  .loader {
    margin-top: 20px;
    width: 60px;
    height: 4px;
    background: #333;
    overflow: hidden;
    border-radius: 10px;
  }

  .loader div {
    width: 40%;
    height: 100%;
    background: #e50914;
    animation: load 1s infinite;
  }

  @keyframes load {
    0% { transform: translateX(-100%); }
    50% { transform: translateX(100%); }
    100% { transform: translateX(-100%); }
  }

  .hero-bg {
    background-image: url("https://images.unsplash.com/photo-1524985069026-dd778a71c7b4");
    background-size: cover;
    background-position: center;
  }

  .overlay {
    background: linear-gradient(to top, black, rgba(0,0,0,0.3));
  }

  .scrollbar-hide::-webkit-scrollbar {
    display: none;
  }

  .hidden {
    display: none;
  }
</style>
</head>

<body class="text-white">

<!-- SPLASH SCREEN -->
<div id="splash" class="splash">
  <div class="logo">Dj Star Movies</div>
  <div class="loader"><div></div></div>
</div>

<!-- MAIN APP -->
<div id="app" class="hidden">

  <!-- NAVBAR -->
  <header class="flex items-center justify-between px-6 py-4 fixed w-full z-50 bg-black/60 backdrop-blur">
    <h1 class="text-2xl font-bold text-red-600">Dj Star Movies</h1>

    <div class="space-x-4">
      <button>Home</button>
      <button class="text-gray-300">Movies</button>
      <button class="text-gray-300">Series</button>
      <button class="bg-red-600 px-4 py-2 rounded-lg">Sign In</button>
    </div>
  </header>

  <!-- HERO -->
  <section class="hero-bg h-[90vh] flex items-end relative">
    <div class="overlay absolute inset-0"></div>

    <div class="relative z-10 p-10 max-w-2xl">
      <h2 class="text-5xl font-bold mb-4">THE EXPENDABLES 4</h2>
      <p class="text-gray-300 mb-6">
        Watch the latest movies and exclusive series in Kiswahili.
      </p>

      <div class="space-x-4">
        <button class="bg-white text-black px-6 py-3 rounded-lg font-bold">▶ Watch Now</button>
        <button class="bg-gray-700 px-6 py-3 rounded-lg">More Info</button>
      </div>
    </div>
  </section>

  <!-- MOVIES -->
  <section class="px-6 mt-10 space-y-10">

    <div>
      <h3 class="text-xl font-bold mb-3">🔥 Trending Now</h3>
      <div class="flex space-x-4 overflow-x-auto scrollbar-hide">
        <img class="w-40 rounded-lg" src="https://image.tmdb.org/t/p/w500/8UlWHLMpgZm9bx6QYh0NFoq67TZ.jpg">
        <img class="w-40 rounded-lg" src="https://image.tmdb.org/t/p/w500/1g0dhYtq4irTY1GPXvft6k4YLjm.jpg">
        <img class="w-40 rounded-lg" src="https://image.tmdb.org/t/p/w500/9Gtg2DzBhmYamXBS1hKAhiwbBKS.jpg">
      </div>
    </div>
<section class="px-6 mt-10 space-y-12">

  <!-- TRENDING -->
  <div>
    <h3 class="text-xl font-bold mb-3">🔥 Trending Now</h3>
    <div class="flex space-x-4 overflow-x-auto scrollbar-hide">
      <img class="w-40 rounded-lg" src="https://image.tmdb.org/t/p/w500/8UlWHLMpgZm9bx6QYh0NFoq67TZ.jpg">
      <img class="w-40 rounded-lg" src="https://image.tmdb.org/t/p/w500/1g0dhYtq4irTY1GPXvft6k4YLjm.jpg">
      <img class="w-40 rounded-lg" src="https://image.tmdb.org/t/p/w500/9Gtg2DzBhmYamXBS1hKAhiwbBKS.jpg">
      <img class="w-40 rounded-lg" src="https://image.tmdb.org/t/p/w500/6DrHO1jr3qVrViUO6s6kFiAGM7.jpg">
    </div>
  </div>

  <!-- LATEST MOVIES -->
  <div>
    <h3 class="text-xl font-bold mb-3">🎬 Latest Movies</h3>
    <div class="flex space-x-4 overflow-x-auto scrollbar-hide">

      <img class="w-40 rounded-lg hover:scale-105 transition" src="https://image.tmdb.org/t/p/w500/6ELCZlTA5lGUops70hKdB83WJxH.jpg">
      <img class="w-40 rounded-lg hover:scale-105 transition" src="https://image.tmdb.org/t/p/w500/2yhg0mZqmUxt5s4eLhYp8K6T1a.jpg">
      <img class="w-40 rounded-lg hover:scale-105 transition" src="https://image.tmdb.org/t/p/w500/7WsyChQLEftFiDOVTGkv3hFpyyt.jpg">
      <img class="w-40 rounded-lg hover:scale-105 transition" src="https://image.tmdb.org/t/p/w500/9yBVqNruk6Ykrwc32qrK2TIE5xw.jpg">

    </div>
  </div>

  <!-- LATEST SERIES -->
  <div>
    <h3 class="text-xl font-bold mb-3">📺 Latest Series</h3>
    <div class="flex space-x-4 overflow-x-auto scrollbar-hide">

      <img class="w-40 rounded-lg hover:scale-105 transition" src="https://image.tmdb.org/t/p/w500/5KCVkau1HEl7ZzfPsKAPM0sMiKc.jpg">
      <img class="w-40 rounded-lg hover:scale-105 transition" src="https://image.tmdb.org/t/p/w500/3ssU4k8Tq5JwJ5xv8J7p1.jpg">
      <img class="w-40 rounded-lg hover:scale-105 transition" src="https://image.tmdb.org/t/p/w500/8bRIf5hJXRi7hVd9pZ5K.jpg">
      <img class="w-40 rounded-lg hover:scale-105 transition" src="https://image.tmdb.org/t/p/w500/4j0PNHkMr5ax3IA8tjtxcmPU3QT.jpg">

    </div>
  </div>

</section>
  </section>

  <footer class="text-center text-gray-500 py-10 mt-10">
    <p>© 2026 Dj Star Movies</p>
  </footer>

</div>

<script>
  // Splash screen timer
  window.addEventListener("load", () => {
    setTimeout(() => {
      document.getElementById("splash").style.display = "none";
      document.getElementById("app").classList.remove("hidden");
      document.body.style.overflow = "auto";
    }, 4000); // 4 seconds
  });
</script>

</body>
</html>
