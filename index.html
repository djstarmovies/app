<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dj Star Movies - Cinema</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
  body {
    background: #000;
    color: white;
  }

  .player-box {
    aspect-ratio: 16/9;
    width: 100%;
    background: #111;
    border-radius: 12px;
    overflow: hidden;
    position: relative;
  }

  .lock-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    z-index: 10;
  }
</style>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js"

const supabase = createClient(
  "https://rjjsdqikvtzhnpmdouir.supabase.co",
  "YOUR_ANON_KEY"
)

window.supabase = supabase

// LOGIN FUNCTION
window.loginToUnlock = async function () {
  const { error } = await supabase.auth.signInWithOAuth({
    provider: "google",
    options: {
      redirectTo: window.location.href
    }
  })

  if (error) alert(error.message)
}

// CHECK LOGIN STATUS
async function checkUser() {
  const { data } = await supabase.auth.getUser()

  if (data.user) {
    document.getElementById("lock").classList.add("hidden")
  } else {
    document.getElementById("lock").classList.remove("hidden")
  }
}

checkUser()
</script>

</head>

<body>

<header class="flex justify-between items-center px-6 py-4 border-b border-gray-800">
  <h1 class="text-red-600 font-bold text-xl">Dj Star Movies</h1>
  <a href="home.html" class="text-gray-300">← Back</a>
</header>

<section class="max-w-5xl mx-auto p-6">

  <div class="player-box mb-6">

    <iframe
      class="w-full h-full"
      src="https://www.youtube.com/embed/dQw4w9WgXcQ"
      allowfullscreen
      allow="autoplay; encrypted-media">
    </iframe>

    <div id="lock" class="lock-overlay">
      <h2 class="text-2xl font-bold mb-2">Premium Content</h2>
      <p class="text-gray-400 mb-4">Login to watch this movie</p>

      <button 
        onclick="loginToUnlock()" 
        class="bg-red-600 px-6 py-3 rounded hover:bg-red-700 transition">
        🔐 Continue with Google
      </button>
    </div>

  </div>

  <div class="mb-6">
    <h2 class="text-3xl font-bold">Movie Title Here</h2>

    <div class="flex space-x-3 text-sm text-gray-400 mt-2">
      <span>2026</span>
      <span>•</span>
      <span>Action</span>
      <span>•</span>
      <span>2h 10m</span>
    </div>

    <p class="text-gray-400 mt-4">
      This movie will later be loaded dynamically from Supabase.
    </p>
  </div>

  <div class="flex space-x-4 mb-10">
    <button class="bg-red-600 px-5 py-2 rounded">▶ Play</button>
    <button class="bg-gray-700 px-5 py-2 rounded">+ My List</button>
  </div>

  <div>
    <h3 class="text-xl font-bold mb-3">🔥 Related Movies</h3>

    <div class="flex space-x-4 overflow-x-auto">
      <img class="w-40 rounded-lg" src="https://images.unsplash.com/photo-1517602302552-471fe67acf66">
      <img class="w-40 rounded-lg" src="https://images.unsplash.com/photo-1509343256512-d77a5cb3791b">
      <img class="w-40 rounded-lg" src="https://images.unsplash.com/photo-1522120692538-9fce0c6f3f8c">
    </div>
  </div>

</section>

</body>
</html>
