<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DJ STAR MOVIES</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#090909;
color:white;
padding-bottom:90px;
}

/* HEADER */

header{
position:fixed;
top:0;
left:0;
width:100%;
padding:10px 15px;
background:#000;
display:flex;
align-items:center;
gap:10px;
z-index:999;
box-shadow:0 3px 10px rgba(0,0,0,.4);
}

.logo{
height:50px;
}

.search{
flex:1;
}

.search input{
width:100%;
padding:12px;
border-radius:30px;
border:none;
background:#1f1f1f;
color:white;
font-size:15px;
outline:none;
}

/* HERO */

.hero{
margin-top:75px;
position:relative;
height:240px;
overflow:hidden;
}

.slider{
display:flex;
height:100%;
transition:.6s;
}

.slide{
min-width:100%;
position:relative;
}

.slide img{
width:100%;
height:100%;
object-fit:cover;
}

.overlay{
position:absolute;
bottom:0;
left:0;
right:0;
padding:25px;
background:linear-gradient(transparent,#000);
}

.overlay h2{
font-size:28px;
}

.overlay p{
margin-top:5px;
color:#ddd;
}

/* CONTENT */

.container{
padding:20px;
}

h3{
margin-bottom:15px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
gap:15px;
}

.card{
background:#161616;
border-radius:12px;
overflow:hidden;
transition:.3s;
cursor:pointer;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
height:220px;
object-fit:cover;
}

.card h4{
padding:10px;
font-size:15px;
}

/* FOOTER */

footer{
position:fixed;
bottom:0;
left:0;
width:100%;
height:65px;
background:#111;
display:flex;
justify-content:space-around;
align-items:center;
box-shadow:0 -3px 12px rgba(0,0,0,.5);
}

footer a{
text-decoration:none;
color:white;
font-size:14px;
display:flex;
flex-direction:column;
align-items:center;
}

.subscribe{
background:#e50914;
padding:10px 16px;
border-radius:25px;
font-weight:bold;
}

</style>

</head>

<body>

<header>

<img class="logo"
src="https://i.ibb.co/VYDYSkjQ/Chat-GPT-Image-Jul-3-2026-12-24-19-AM.png">

<div class="search">
<input
type="text"
id="search"
placeholder="Search Movies or Series...">
</div>

</header>

<div class="hero">

<div class="slider" id="slider">

<div class="slide">
<img src="https://i.ytimg.com/an_webp/Id89GVe53AE/mqdefault_6s.webp?du=3000&sqp=CN_7nNIG&rs=AOn4CLDT-BWevl5FGVNVWISt7y9Q_x_9EA">
<div class="overlay">
<h2>DJ STAR MOVIES</h2>
<p>Kenya's Home of Kiswahili Dubbed Movies & Series</p>
</div>
</div>

<div class="slide">
<img src="https://i.ytimg.com/an_webp/dN9KlVnGuL0/mqdefault_6s.webp?du=3000&sqp=CIG4ndIG&rs=AOn4CLDkhSAge2asHEY4KBFRUOVTT_--fA">
</div>

<div class="slide">
<img src="https://i.ytimg.com/an_webp/W_y208n6ERg/mqdefault_6s.webp?du=3000&sqp=CPihndIG&rs=AOn4CLA1Oy66F__NhK8bHQrArnRBxScisQ">
</div>

<div class="slide">
<img src="https://i.ytimg.com/an_webp/Id89GVe53AE/mqdefault_6s.webp?du=3000&sqp=CN_7nNIG&rs=AOn4CLDT-BWevl5FGVNVWISt7y9Q_x_9EA">
</div>

<div class="slide">
<img src="https://i.ytimg.com/an_webp/W_y208n6ERg/mqdefault_6s.webp?du=3000&sqp=CPihndIG&rs=AOn4CLA1Oy66F__NhK8bHQrArnRBxScisQ">
</div>

</div>

</div>

<div class="container">

<h3>Trending Now</h3>

<div class="grid" id="movies">

<div class="card">
<img src="https://picsum.photos/300/450?1">
<h4>Fast X Kiswahili</h4>
</div>

<div class="card">
<img src="https://picsum.photos/300/450?2">
<h4>The Equalizer</h4>
</div>

<div class="card">
<img src="https://picsum.photos/300/450?3">
<h4>John Wick</h4>
</div>

<div class="card">
<img src="https://picsum.photos/300/450?4">
<h4>Squid Game</h4>
</div>

<div class="card">
<img src="https://picsum.photos/300/450?5">
<h4>Money Heist</h4>
</div>

<div class="card">
<img src="https://picsum.photos/300/450?6">
<h4>Extraction</h4>
</div>

</div>

</div>

<footer>

<a href="series.html">
📺
<span>Series</span>
</a>

<a href="movies.html">
🎬
<span>Movies</span>
</a>

<a href="#" id="accountBtn">
👤
<span>Account</span>
</a>

<a href="subscribe.html" class="subscribe">
Subscribe
</a>

</footer>

<script>

// HERO SLIDER

let current=0;

const slider=document.getElementById("slider");

const slides=document.querySelectorAll(".slide");

setInterval(()=>{

current++;

if(current>=slides.length){
current=0;
}

slider.style.transform="translateX(-"+current*100+"%)";

},4000);


// SEARCH

document.getElementById("search").addEventListener("keyup",function(){

let value=this.value.toLowerCase();

document.querySelectorAll(".card").forEach(card=>{

card.style.display=
card.innerText.toLowerCase().includes(value)
?"block":"none";

});

});


// ACCOUNT LOGIN CHECK

document.getElementById("accountBtn").onclick=function(){

if(localStorage.getItem("loggedIn")=="true"){

window.location="my_account.html";

}else{

window.location="login.html";

}

};

</script>

</body>
</html>
