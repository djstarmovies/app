<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DJ STAR MOVIES</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
-webkit-tap-highlight-color:transparent;
}

html{
scroll-behavior:smooth;
}

body{
background:#090909;
color:#fff;
overflow-x:hidden;
padding-bottom:90px;
}

/* ===========================
SPLASH SCREEN
=========================== */

#splash{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:999999;
transition:1s;
}

#splash.hide{
opacity:0;
visibility:hidden;
}

.splash-logo{
width:180px;
animation:zoomLogo 1.5s infinite alternate;
}

.loading-box{
width:220px;
height:6px;
background:#222;
margin-top:30px;
border-radius:30px;
overflow:hidden;
}

.loading-bar{
height:100%;
width:0%;
background:#e50914;
animation:loading 2.8s linear forwards;
}

@keyframes loading{

0%{width:0%;}

100%{width:100%;}

}

@keyframes zoomLogo{

0%{
transform:scale(.9);
opacity:.8;
}

100%{
transform:scale(1.05);
opacity:1;
}

}

/* ===========================
HEADER
=========================== */

header{

position:fixed;
top:0;
left:0;
right:0;

display:flex;
align-items:center;
gap:14px;

padding:12px 15px;

background:rgba(0,0,0,.88);
backdrop-filter:blur(12px);

z-index:999;

box-shadow:0 5px 20px rgba(0,0,0,.45);

}

.logo{

height:60px;
width:auto;

}

.search{

flex:1;

}

.search input{

width:100%;

height:46px;

border:none;

outline:none;

padding:0 18px;

border-radius:30px;

background:#1d1d1d;

color:white;

font-size:15px;

transition:.35s;

}

.search input:focus{

background:#292929;

box-shadow:0 0 0 2px #e50914;

}

/* ===========================
HERO
=========================== */

.hero{

margin-top:86px;

height:230px;

overflow:hidden;

position:relative;

}

.slider{

display:flex;

height:100%;

transition:1s ease;

}

.slide{

min-width:100%;

position:relative;

}

.slide img{

width:100%;

height:100%;

object-fit:cover;

}

.slide::after{

content:"";

position:absolute;

left:0;

right:0;

bottom:0;

top:0;

background:linear-gradient(to top,#090909,transparent,transparent);

}

.hero-text{

position:absolute;

left:20px;

bottom:22px;

z-index:5;

}

.hero-text h1{

font-size:28px;

font-weight:700;

}

.hero-text p{

font-size:13px;

margin-top:4px;

color:#ddd;

}

/* ===========================
SECTION
=========================== */

.section{

padding:20px 14px;

}

.section-title{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:15px;

}

.section-title h2{

font-size:19px;

font-weight:600;

}

.section-title a{

text-decoration:none;

color:#e50914;

font-size:13px;

}

/* ===========================
GRID
=========================== */

.grid{

display:grid;

grid-template-columns:repeat(3,1fr);

gap:10px;

}

.card{

background:#171717;

border-radius:10px;

overflow:hidden;

cursor:pointer;

transition:.35s;

}

.card:hover{

transform:translateY(-5px);

box-shadow:0 10px 20px rgba(0,0,0,.45);

}

.card img{

width:100%;

aspect-ratio:2/3;

object-fit:cover;

display:block;

}

.card-info{

padding:8px;

}

.card-title{

font-size:12px;

font-weight:600;

white-space:nowrap;

overflow:hidden;

text-overflow:ellipsis;

}

.card-sub{

margin-top:3px;

font-size:10px;

color:#aaa;

}

/* ===========================
SCROLLBAR
=========================== */

::-webkit-scrollbar{

width:4px;

}

::-webkit-scrollbar-thumb{

background:#e50914;

border-radius:30px;

}

/* ===========================
BOTTOM NAVIGATION
=========================== */

footer{

position:fixed;

left:0;

bottom:0;

width:100%;

height:68px;

background:#111;

display:flex;

justify-content:space-around;

align-items:center;

box-shadow:0 -4px 18px rgba(0,0,0,.45);

z-index:999;

}

footer a{

color:white;

text-decoration:none;

display:flex;

flex-direction:column;

align-items:center;

font-size:11px;

transition:.3s;

}

footer a:hover{

color:#e50914;

}

footer i{

font-size:22px;

margin-bottom:4px;

}

.subscribe-btn{

background:#e50914;

padding:10px 18px;

border-radius:30px;

font-size:13px;

font-weight:600;

}

/* ===========================
ANIMATIONS
=========================== */

.fadeUp{

animation:fadeUp .7s ease;

}

@keyframes fadeUp{

from{

opacity:0;

transform:translateY(25px);

}

to{

opacity:1;

transform:translateY(0);

}

}

/* ===========================
RESPONSIVE
=========================== */

@media(min-width:700px){

.hero{

height:360px;

}

.grid{

grid-template-columns:repeat(5,1fr);

}

.logo{

height:65px;

}

.search input{

height:48px;

font-size:16px;

}

}

@media(min-width:1100px){

.grid{

grid-template-columns:repeat(7,1fr);

}

.hero{

height:470px;

}

}

</style>

</head>

<body>

<header>

<img class="logo"
src="https://i.ibb.co/VYDYSkjQ/Chat-GPT-Image-Jul-3-2026-12-24-19-AM.png">

<div class="search">
<input
type="text"
id="search"
placeholder="Search Movies or Series...">

<div class="slider" id="slider">

<div class="overlay">

<div class="slide">

</div>

<div class="slide">

</div>

<div class="slide">

</div>

<div class="slide">
<img src="https://i.ytimg.com/an_webp/W_y208n6ERg/mqdefault_6s.webp?du=3000&sqp=CPihndIG&rs=AOn4CLA1Oy66F__NhK8bHQrArnRBxScisQ">
</div>

</div>

</div>

<div class="container">

<h3>Trending Now</h3>

<div class="grid" id="movies">

<div class="card">
<img src="https://picsum.photos/300/450?1">
<h4>Fast X Kiswahili</h4>
</div>

<div class="card">
<img src="https://picsum.photos/300/450?2">

<div class="card">

<div class="card">

<h4>Squid Game</h4>
</div>

<div class="card">
<img src="https://picsum.photos/300/450?5">

</div>

<div class="card">
<img src="https://picsum.photos/300/450?6">
<h4>Extraction</h4>
</div>

</div>

</div>

<footer>

<a href="series.html">
📺
<span>Series</span>
</a>

<a href="movies.html">
🎬
<span>Movies</span>
</a>

<a href="#" id="accountBtn">
👤
<span>Account</span>
</a>

<a href="subscribe.html" class="subscribe">
Subscribe
</a>

</footer>

<script>

// HERO SLIDER

let current=0;

const slider=document.getElementById("slider");

const slides=document.querySelectorAll(".slide");

setInterval(()=>{

current++;

if(current>=slides.length){
current=0;
}

slider.style.transform="translateX(-"+current*100+"%)";

},4000);


// SEARCH

document.getElementById("search").addEventListener("keyup",function(){

let value=this.value.toLowerCase();

document.querySelectorAll(".card").forEach(card=>{

card.style.display=
card.innerText.toLowerCase().includes(value)
?"block":"none";

});

});


// ACCOUNT LOGIN CHECK

document.getElementById("accountBtn").onclick=function(){

if(localStorage.getItem("loggedIn")=="true"){

window.location="my_account.html";

}else{

window.location="login.html";

}

};

</script>

</body>
</html>
