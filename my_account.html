<!DOCTYPE html>
<html>

<head>

<title>My DJStar Account</title>

<meta name="viewport" content="width=device-width, initial-scale=1">


<style>

*{
box-sizing:border-box;
font-family:Arial, sans-serif;
}
.home-btn{

width:100%;

padding:15px;

margin-top:20px;

border:none;

border-radius:12px;

background:#16a34a;

color:white;

font-size:18px;

font-weight:bold;

cursor:pointer;

}


.home-btn:hover{

background:#128038;

}



.logout-btn{

margin-top:30px;

background:none;

border:none;

color:#999;

font-size:13px;

cursor:pointer;

}


body{

margin:0;

min-height:100vh;

background:
linear-gradient(
135deg,
#050505,
#202020
);

display:flex;

justify-content:center;

align-items:center;

}



.account-card{

width:420px;

background:white;

border-radius:25px;

padding:30px;

box-shadow:
0 15px 50px rgba(0,0,0,.5);

}



.logo{

text-align:center;

font-size:30px;

font-weight:bold;

color:#16a34a;

margin-bottom:20px;

}



.profile-item{

background:#f5f5f5;

padding:15px;

margin:12px 0;

border-radius:12px;

}



.label{

font-size:13px;

color:#777;

}



.value{

font-size:18px;

font-weight:bold;

margin-top:5px;

}



.status{

color:#16a34a;

}



button{

width:100%;

padding:15px;

margin-top:20px;

border:none;

border-radius:12px;

background:#dc2626;

color:white;

font-size:17px;

font-weight:bold;

cursor:pointer;

}



button:hover{

background:#b91c1c;

}



.loading{

text-align:center;

font-size:18px;

}



</style>


</head>


<body>



<div class="account-card">


<div class="logo">
DJSTAR MOVIES
</div>


<div id="content">

<div class="loading">

Loading account...

</div>

</div>



<button class="home-btn" onclick="goHome()">
🏠 GO TO HOME
</button>


<button class="logout-btn" onclick="logout()">
Logout
</button>


</div>





<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>


<script>


// ================================
// SUPABASE
// ================================


const SUPABASE_URL =
"https://rjjsdqikvtzhnpmdouir.supabase.co";


const SUPABASE_KEY =
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJqanNkcWlrdnR6aG5wbWRvdWlyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI5NzAxMDAsImV4cCI6MjA5ODU0NjEwMH0.sbeeCa8LVYGzPzT5mm06eZeQfjrRdFgbsUjqoR2K7tk";


const supabaseClient =
supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);





// ================================
// LOAD ACCOUNT
// ================================


async function loadAccount(){



let userID =
localStorage.getItem("user_id");



if(!userID){


window.location.href="auth.html";

return;

}




const {

data,

error

}=

await supabaseClient

.from("profiles")

.select("*")

.eq("id", userID)

.single();





if(error || !data){


document.getElementById("content").innerHTML=

"Account not found";


return;

}





document.getElementById("content").innerHTML=`

<div class="profile-item">

<div class="label">
Username
</div>

<div class="value">
${data.username}
</div>

</div>



<div class="profile-item">

<div class="label">
WhatsApp Number
</div>

<div class="value">
${data.whatsapp_number}
</div>

</div>



<div class="profile-item">

<div class="label">
Account Status
</div>

<div class="value status">
${data.account_status}
</div>

</div>



<div class="profile-item">

<div class="label">
Subscription
</div>

<div class="value">
${data.subscription_plan}
</div>

</div>



<div class="profile-item">

<div class="label">
Paid Account
</div>

<div class="value">

${data.paid_status ? 
"Premium Member" :
"Free Account"}

</div>

</div>



<div class="profile-item">

<div class="label">
Joined
</div>

<div class="value">

${new Date(data.created_at)
.toLocaleDateString()}

</div>

</div>

`;



}




// ================================
// LOGOUT
// ================================


function logout(){


localStorage.removeItem("loggedIn");

localStorage.removeItem("user_id");


window.location.href="auth.html";


}




loadAccount();


</script>



</body>

</html>
