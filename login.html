<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dj Star Movies</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <script type="module" src="app.js"></script>
</head>

<body class="bg-black text-white min-h-screen flex items-center justify-center">

<div class="w-full max-w-md p-8">

    <h1 class="text-4xl font-bold mb-2">
        Dj Star Movies
    </h1>

    <p class="text-gray-400 mb-8">
        Watch Kiswahili Movies & Series
    </p>

    <button
        onclick="loginGoogle()"
        class="w-full bg-white text-black p-4 rounded-xl font-semibold mb-6">
        Continue with Google
    </button>

    <div class="text-center mb-6">
        OR
    </div>

    <input
        id="phone"
        type="tel"
        placeholder="+256700000000"
        class="w-full p-4 rounded-xl bg-gray-900 border border-gray-700 mb-4">

    <button
        onclick="sendOTP()"
        class="w-full bg-red-600 hover:bg-red-700 p-4 rounded-xl">
        Continue with Phone
    </button>

</div>

</body>
</html>
